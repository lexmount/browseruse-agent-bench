# Custom model pricing table for llm_cost.py.
#
# Units: USD per 1M tokens (USD/M) for readability.
# The loader (browseruse_bench/utils/llm_cost.py) normalizes these values to
# LiteLLM-compatible per-token fields.
#
# Resolution order (see _build_usage_summary):
#   1) this custom table (takes priority over LiteLLM)
#   2) LiteLLM price table
#   3) cost = 0 when still missing
#
# Key rule:
#   - The model key must match MODEL_ID / resolved model name exactly
#     (case-insensitive: keys are lowercased on load).
#   - MODEL_ID is read from result.json "model_id", which comes from the
#     active_model.model_id in config.yaml.
#
# Currency:
#   - total_cost is a single aggregate, so the whole table is denominated in USD.
#   - USD-native providers (OpenAI / Anthropic / Google / Moonshot / MiniMax /
#     DeepSeek / Browser Use) use their published USD list price.
#   - CNY-quoted providers (Zhipu GLM on Aliyun Bailian, Doubao/Volcengine,
#     Qwen/Tongyi on Aliyun Bailian) are converted at 1 CNY = 0.145 USD
#     (USD/CNY ~= 6.9), consistent with the pre-existing entries below. The
#     original CNY list price is shown in the comment beside each value.
#   - For tiered (context-length) pricing we use the base/short-context tier,
#     which matches the typical browser-agent step (<32K-128K input).
#
# Coverage target: every model in the LexBench tech report (0624 revision) plus
# all model_id strings present in config.example.yaml and past experiment runs.
# Prices sourced from official / platform pricing pages, June 2026.

